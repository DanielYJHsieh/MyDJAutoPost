name: Auto Post to Facebook

on:
  workflow_dispatch:  # 手動觸發（測試用）
  schedule:
    - cron: '0 1 * * *'  # 每天 UTC 01:00 = 台灣時間 09:00

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run action2 script
        run: python action2.py
